<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Kids English Adventure</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    overflow:hidden;
    background:
    linear-gradient(180deg,#0f172a,#111827,#020617);
    color:white;
}

/* 星空 */

#stars{
    position:fixed;
    inset:0;
    z-index:0;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 4s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* 页面 */

.page{
    position:absolute;
    inset:0;
    z-index:2;
    overflow:auto;
    padding-bottom:100px;
}

.hidden{
    display:none;
}

/* 首页 */

.header{
    text-align:center;
    padding:25px 15px 10px;
}

.logo{
    font-size:34px;
    font-weight:bold;
    text-shadow:0 0 15px cyan;
}

.sub{
    opacity:0.8;
    margin-top:6px;
}

.userBox{
    margin:18px;
    padding:18px;

    border-radius:24px;

    background:
    linear-gradient(145deg,#1e293b,#334155);

    display:flex;
    align-items:center;

    box-shadow:
    0 0 20px rgba(0,255,255,.15);
}

.avatar{
    width:70px;
    height:70px;
    border-radius:50%;

    background:
    linear-gradient(145deg,#00d2ff,#3a7bd5);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:34px;
}

.info{
    margin-left:15px;
    flex:1;
}

.name{
    font-size:24px;
    font-weight:bold;
}

.lv{
    color:#ffe66d;
    margin-top:6px;
}

.coin{
    font-size:24px;
    color:#ffd700;
}

/* 菜单 */

.menu{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    padding:18px;
}

.menuCard{

    height:150px;

    border-radius:25px;

    background:
    linear-gradient(145deg,#00d2ff,#3a7bd5);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    transition:0.25s;

    box-shadow:
    0 0 18px rgba(0,255,255,.25),
    inset 0 0 10px rgba(255,255,255,.25);
}

.menuCard:hover{
    transform:scale(1.05);
}

.icon{
    font-size:48px;
}

.cardTitle{
    margin-top:12px;
    font-size:22px;
    font-weight:bold;
}

/* 游戏 */

.gameTop{
    padding:20px;
    text-align:center;
}

.levelText{
    font-size:30px;
    color:#ffe66d;
}

.exp{
    margin:15px auto;
    width:90%;
    height:18px;
    background:#1e293b;
    border-radius:20px;
    overflow:hidden;
}

.expFill{
    height:100%;
    width:0%;
    background:
    linear-gradient(90deg,#00f5ff,#00ff95);
    transition:0.5s;
}

.grid{
    display:grid;
    gap:12px;
    justify-content:center;
    padding:20px;
}

.card{

    width:80px;
    height:80px;

    border-radius:22px;

    background:
    linear-gradient(145deg,#00d2ff,#3a7bd5);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:18px;
    font-weight:bold;

    cursor:pointer;

    transition:0.25s;

    box-shadow:
    0 0 15px rgba(0,255,255,.25),
    inset 0 0 10px rgba(255,255,255,.3);
}

.card.selected{
    background:#ffe66d;
    color:black;
    transform:scale(1.1);
}

.card.matched{
    opacity:0;
    transform:scale(0);
    pointer-events:none;
}

.message{
    text-align:center;
    font-size:26px;
    color:#00ff95;
    min-height:50px;
}

.backBtn{

    margin:25px auto;

    display:block;

    border:none;

    background:#00eaff;

    color:black;

    padding:16px 34px;

    border-radius:18px;

    font-size:20px;

    font-weight:bold;
}

/* 底部栏 */

.bottomBar{

    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:85px;

    background:
    rgba(15,23,42,.95);

    display:flex;
    justify-content:space-around;
    align-items:center;

    backdrop-filter:blur(10px);

    z-index:10;
}

.navBtn{
    text-align:center;
    font-size:14px;
}

.navIcon{
    font-size:28px;
    margin-bottom:4px;
}

/* 手机 */

@media(max-width:600px){

    .card{
        width:68px;
        height:68px;
        font-size:15px;
    }

    .logo{
        font-size:28px;
    }

}

</style>
</head>
<body>

<!-- 星空 -->

<div id="stars"></div>

<!-- 首页 -->

<div class="page" id="homePage">

    <div class="header">

        <div class="logo">
            🌟 Kids English 🌟
        </div>

        <div class="sub">
            幼儿英语闯关乐园
        </div>

    </div>

    <div class="userBox">

        <div class="avatar">
            🧒
        </div>

        <div class="info">

            <div class="name">
                小小冒险家
            </div>

            <div class="lv">
                Lv.3 英语学徒
            </div>

        </div>

        <div class="coin" id="coin">
            ⭐ 0
        </div>

    </div>

    <div class="menu">

        <div class="menuCard"
        onclick="startGame()">

            <div class="icon">🎮</div>

            <div class="cardTitle">
                开始闯关
            </div>

        </div>

        <div class="menuCard">

            <div class="icon">🐶</div>

            <div class="cardTitle">
                动物英语
            </div>

        </div>

        <div class="menuCard">

            <div class="icon">🍎</div>

            <div class="cardTitle">
                水果乐园
            </div>

        </div>

        <div class="menuCard">

            <div class="icon">🚀</div>

            <div class="cardTitle">
                每日挑战
            </div>

        </div>

    </div>

</div>

<!-- 游戏页 -->

<div class="page hidden" id="gamePage">

    <div class="gameTop">

        <div class="levelText" id="levelText">
            第1关
        </div>

        <div class="exp">

            <div class="expFill"
            id="expFill"></div>

        </div>

    </div>

    <div class="grid" id="grid"></div>

    <div class="message" id="message"></div>

    <button class="backBtn"
    onclick="goHome()">

        返回首页

    </button>

</div>

<!-- 底部 -->

<div class="bottomBar">

    <div class="navBtn">

        <div class="navIcon">🏠</div>

        首页

    </div>

    <div class="navBtn">

        <div class="navIcon">🎮</div>

        游戏

    </div>

    <div class="navBtn">

        <div class="navIcon">🏆</div>

        成就

    </div>

    <div class="navBtn">

        <div class="navIcon">⚙️</div>

        设置

    </div>

</div>

<script>

/* 星空 */

const stars=document.getElementById("stars");

for(let i=0;i<120;i++){

    const s=document.createElement("div");

    s.className="star";

    s.style.left=Math.random()*100+"%";

    s.style.top=Math.random()*100+"%";

    s.style.animationDelay=Math.random()*5+"s";

    stars.appendChild(s);

}

/* 页面 */

const homePage =
document.getElementById("homePage");

const gamePage =
document.getElementById("gamePage");

/* 游戏 */

const levels = [

["cat","dog"],

["apple","banana","cat"],

["red","blue","green","dog"],

["sun","moon","star","apple"],

["fish","bird","tiger","lion"],

["one","two","three","four","five"],

["happy","sad","big","small","hot"],

["car","bus","train","plane","bike"],

["milk","bread","cake","rice","egg"],

["teacher","student","book","pen","school"]

];

let currentLevel=0;

let selected=[];

let starsScore=0;

const grid=document.getElementById("grid");

const message=document.getElementById("message");

const levelText=
document.getElementById("levelText");

const expFill=
document.getElementById("expFill");

const coin=
document.getElementById("coin");

/* 发音 */

function speak(word){

    const utter =
    new SpeechSynthesisUtterance(word);

    utter.lang="en-US";

    utter.rate=0.9;

    speechSynthesis.speak(utter);

}

/* 开始游戏 */

function startGame(){

    homePage.classList.add("hidden");

    gamePage.classList.remove("hidden");

    currentLevel=0;

    loadLevel();

}

/* 返回首页 */

function goHome(){

    gamePage.classList.add("hidden");

    homePage.classList.remove("hidden");

}

/* 经验条 */

function updateExp(){

    const percent =
    (currentLevel/levels.length)*100;

    expFill.style.width =
    percent+"%";

}

/* 加载关卡 */

function loadLevel(){

    selected=[];

    grid.innerHTML="";

    message.innerHTML="";

    levelText.innerHTML=
    `🎮 第 ${currentLevel+1} 关`;

    updateExp();

    let words=[...levels[currentLevel]];

    let cards=[...words,...words];

    cards.sort(()=>Math.random()-0.5);

    let size=Math.ceil(
        Math.sqrt(cards.length)
    );

    grid.style.gridTemplateColumns=
    `repeat(${size},1fr)`;

    cards.forEach(word=>{

        const card=
        document.createElement("div");

        card.className="card";

        card.innerHTML=word;

        card.dataset.word=word;

        card.onclick=()=>selectCard(card);

        grid.appendChild(card);

    });

}

/* 点击 */

function selectCard(card){

    if(
        card.classList.contains("matched")
        ||
        card.classList.contains("selected")
    ) return;

    card.classList.add("selected");

    speak(card.dataset.word);

    selected.push(card);

    if(selected.length===2){

        const a=selected[0];

        const b=selected[1];

        if(a.dataset.word===b.dataset.word){

            setTimeout(()=>{

                a.classList.add("matched");

                b.classList.add("matched");

                starsScore++;

                coin.innerHTML=
                `⭐ ${starsScore}`;

                checkWin();

            },300);

        }else{

            setTimeout(()=>{

                a.classList.remove("selected");

                b.classList.remove("selected");

            },600);

        }

        selected=[];

    }

}

/* 通关 */

function checkWin(){

    const total=
    document.querySelectorAll(".card")
    .length;

    const matched=
    document.querySelectorAll(".matched")
    .length;

    if(total===matched){

        message.innerHTML=
        "🎉 通关成功！";

        setTimeout(()=>{

            currentLevel++;

            if(currentLevel<levels.length){

                loadLevel();

            }else{

                finalWin();

            }

        },1800);

    }

}

/* 最终 */

function finalWin(){

    grid.innerHTML="";

    message.innerHTML=
    "🏆 恭喜完成全部10关！";

    speak("Congratulations");

}

</script>

</body>
</html>
