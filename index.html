<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kids English Ultimate 2.0</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial', 'Helvetica', sans-serif;
}

body {
    overflow: hidden;
    background: linear-gradient(180deg, #0a1428, #1e2937, #0f172a);
    color: white;
    height: 100vh;
}

/* 增强版星空 */
#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(circle at 50% 30%, rgba(100, 200, 255, 0.08) 0%, transparent 60%);
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite alternate;
    box-shadow: 0 0 6px #a0d8ff;
}

@keyframes twinkle {
    0% { opacity: 0.3; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.2); }
}

/* 页面 */
.page {
    position: absolute;
    inset: 0;
    z-index: 2;
    overflow: auto;
    display: none;
}

/* 首页美化 */
.home {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 20px;
    text-align: center;
}

.logo {
    font-size: 42px;
    font-weight: bold;
    text-shadow: 
        0 0 20px #00f0ff,
        0 0 40px #00f0ff;
    margin-bottom: 12px;
    letter-spacing: 2px;
}

.sub {
    font-size: 22px;
    opacity: 0.9;
    margin-bottom: 60px;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
}

.playBtn {
    width: 280px;
    height: 110px;
    border: none;
    border-radius: 50px;
    font-size: 36px;
    font-weight: bold;
    background: linear-gradient(145deg, #00f2ff, #3a8cff, #7b5eff);
    color: white;
    box-shadow: 
        0 15px 35px rgba(0, 210, 255, 0.5),
        inset 0 -8px 15px rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
}

.playBtn::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 40%;
    height: 200%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    transform: skewX(-25deg);
    animation: shine 4s infinite;
}

@keyframes shine {
    0% { transform: translateX(-150%) skewX(-25deg); }
    100% { transform: translateX(300%) skewX(-25deg); }
}

.playBtn:hover {
    transform: scale(1.08) translateY(-8px);
    box-shadow: 0 20px 45px rgba(0, 210, 255, 0.7);
}

/* 游戏界面 */
.topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    z-index: 10;
    border-bottom: 1px solid rgba(0, 240, 255, 0.2);
}

.level {
    font-size: 26px;
    font-weight: bold;
    color: #ffe66d;
    text-shadow: 0 0 10px #ffe66d;
}

.timer {
    font-size: 26px;
    font-weight: bold;
    color: #ff6b6b;
}

.restartBtn {
    padding: 10px 20px;
    border: none;
    border-radius: 9999px;
    background: linear-gradient(#00ffcc, #00ccaa);
    color: #000;
    font-weight: bold;
    cursor: pointer;
    font-size: 15px;
    box-shadow: 0 4px 15px rgba(0, 255, 200, 0.4);
}

/* 网格 */
.grid {
    display: grid;
    gap: 12px;
    justify-content: center;
    padding: 20px;
    margin: 0 auto;
    max-width: 1100px;
}

/* 卡片美化 */
.card {
    border-radius: 22px;
    background: linear-gradient(145deg, #1e88e5, #42a5f5);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 
        0 8px 25px rgba(0, 140, 255, 0.35),
        inset 0 0 20px rgba(255,255,255,0.3);
    user-select: none;
    overflow: hidden;
}

.card:hover {
    transform: scale(1.08) rotate(2deg);
}

.card.selected {
    background: linear-gradient(145deg, #ffd700, #ffeb3b);
    color: #000;
    transform: scale(1.12);
    box-shadow: 0 0 30px #ffd700;
}

.card.matched {
    opacity: 0;
    transform: scale(0.3) rotate(15deg);
    transition: all 0.6s ease;
}

/* 卡片内容 */
.emoji {
    font-size: 48px;
    margin-bottom: 6px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
}

.word {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* 信息 */
.message {
    text-align: center;
    font-size: 42px;
    margin: 20px auto;
    max-width: 90%;
    color: #00ffaa;
    text-shadow: 0 0 20px #00ffaa;
    line-height: 1.3;
}

.bigWin {
    animation: boom 0.8s infinite alternate;
}

@keyframes boom {
    from { transform: scale(1); }
    to { transform: scale(1.15); }
}

/* 弹窗 */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.popupBox {
    width: 92%;
    max-width: 460px;
    background: linear-gradient(145deg, #1e293b, #334155);
    padding: 40px 30px;
    border-radius: 32px;
    text-align: center;
    box-shadow: 0 0 60px rgba(0, 240, 255, 0.5);
    border: 2px solid rgba(0, 240, 255, 0.3);
}

.popupTitle {
    font-size: 32px;
    margin-bottom: 24px;
}

/* 按钮 */
.startBtn, .restartBigBtn {
    margin-top: 30px;
    padding: 18px 48px;
    border: none;
    border-radius: 9999px;
    background: linear-gradient(145deg, #00ffcc, #00b3ff);
    color: #000;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0, 255, 200, 0.5);
    transition: all 0.3s;
}

.startBtn:hover, .restartBigBtn:hover {
    transform: scale(1.1);
}
</style>
</head>
<body>

<!-- 星空 -->
<div id="stars"></div>

<!-- 首页 -->
<div class="page home" id="homePage">
    <div class="logo">🌟 Kids English 2.0 🌟</div>
    <div class="sub">幼儿英语 快乐闯关乐园</div>
    <button class="playBtn" id="playBtn">🎮 开始冒险</button>
</div>

<!-- 游戏页面 -->
<div class="page" id="gamePage">
    <div class="topBar">
        <div class="level" id="levelText">第 1 关 - 水果乐园</div>
        <div class="timer" id="timer">⏰ 180</div>
        <button class="restartBtn" onclick="restartCurrentLevel()">🔄 本关重玩</button>
    </div>
    
    <div class="grid" id="grid"></div>
    <div class="message" id="message"></div>
</div>

<!-- 规则弹窗 -->
<div class="popup" id="popup">
    <div class="popupBox">
        <div class="popupTitle">📖 游戏规则</div>
        <p style="font-size:18px;line-height:1.8;">
            点击两张相同的图片配对<br><br>
            点击后会自动播放英文发音<br><br>
            全部配对成功即可进入下一关<br><br>
            时间会越来越紧张哦！
        </p>
        <button class="startBtn" id="startBtn">开始冒险 →</button>
    </div>
</div>

<script>
// ==================== 星空增强 ====================
const starsContainer = document.getElementById("stars");
for (let i = 0; i < 280; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 3.5 + 1;
    s.style.width = size + "px";
    s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.animationDelay = Math.random() * 4 + "s";
    s.style.opacity = Math.random() * 0.7 + 0.4;
    starsContainer.appendChild(s);
}

// ==================== 数据 ====================
const allLevels = [
    // 1. 水果
    [{emoji:"🍎",word:"apple"},{emoji:"🍌",word:"banana"},{emoji:"🍇",word:"grape"},
     {emoji:"🍓",word:"strawberry"},{emoji:"🍉",word:"watermelon"},{emoji:"🍊",word:"orange"},
     {emoji:"🍒",word:"cherry"},{emoji:"🥝",word:"kiwi"}],
    
    // 2. 蔬菜
    [{emoji:"🥕",word:"carrot"},{emoji:"🌽",word:"corn"},{emoji:"🥔",word:"potato"},
     {emoji:"🍅",word:"tomato"},{emoji:"🥦",word:"broccoli"},{emoji:"🧅",word:"onion"},
     {emoji:"🌶️",word:"pepper"},{emoji:"🥬",word:"cabbage"}],
    
    // 3. 动物
    [{emoji:"🐱",word:"cat"},{emoji:"🐶",word:"dog"},{emoji:"🐰",word:"rabbit"},
     {emoji:"🐼",word:"panda"},{emoji:"🦁",word:"lion"},{emoji:"🐸",word:"frog"},
     {emoji:"🐵",word:"monkey"},{emoji:"🦋",word:"butterfly"},{emoji:"🐢",word:"turtle"}],
    
    // 4. 生活用品
    [{emoji:"🪥",word:"toothbrush"},{emoji:"🧸",word:"teddy"},{emoji:"🛏️",word:"bed"},
     {emoji:"🪑",word:"chair"},{emoji:"💡",word:"lamp"},{emoji:"📱",word:"phone"},
     {emoji:"⌚",word:"watch"},{emoji:"🎒",word:"backpack"},{emoji:"🧴",word:"bottle"}],
    
    // 5. 交通工具
    [{emoji:"🚗",word:"car"},{emoji:"✈️",word:"plane"},{emoji:"🚲",word:"bike"},
     {emoji:"🚂",word:"train"},{emoji:"🚌",word:"bus"},{emoji:"🚢",word:"ship"},
     {emoji:"🚁",word:"helicopter"},{emoji:"🏍️",word:"motorcycle"},{emoji:"🛵",word:"scooter"}],
    
    // 6. 颜色
    [{emoji:"🔴",word:"red"},{emoji:"🔵",word:"blue"},{emoji:"🟢",word:"green"},
     {emoji:"🟡",word:"yellow"},{emoji:"🟣",word:"purple"},{emoji:"🟠",word:"orange"},
     {emoji:"⚫",word:"black"},{emoji:"⚪",word:"white"},{emoji:"🟤",word:"brown"}],
    
    // 7. 数字
    [{emoji:"1️⃣",word:"one"},{emoji:"2️⃣",word:"two"},{emoji:"3️⃣",word:"three"},
     {emoji:"4️⃣",word:"four"},{emoji:"5️⃣",word:"five"},{emoji:"6️⃣",word:"six"},
     {emoji:"7️⃣",word:"seven"},{emoji:"8️⃣",word:"eight"},{emoji:"9️⃣",word:"nine"},
     {emoji:"🔟",word:"ten"}],
    
    // 8. 身体部位
    [{emoji:"👀",word:"eyes"},{emoji:"👂",word:"ears"},{emoji:"👃",word:"nose"},
     {emoji:"👄",word:"mouth"},{emoji:"🖐️",word:"hand"},{emoji:"🦶",word:"foot"},
     {emoji:"💪",word:"arm"},{emoji:"🦵",word:"leg"},{emoji:"🧠",word:"brain"}],
    
    // 9. 食物
    [{emoji:"🍕",word:"pizza"},{emoji:"🍔",word:"hamburger"},{emoji:"🍟",word:"fries"},
     {emoji:"🍰",word:"cake"},{emoji:"🍩",word:"donut"},{emoji:"🍪",word:"cookie"},
     {emoji:"🍜",word:"noodles"},{emoji:"🥛",word:"milk"},{emoji:"🍦",word:"icecream"}],
    
    // 10. Boss 混合关
    [{emoji:"🐱",word:"cat"},{emoji:"🍎",word:"apple"},{emoji:"🚗",word:"car"},
     {emoji:"🍕",word:"pizza"},{emoji:"🔴",word:"red"},{emoji:"🧸",word:"teddy"},
     {emoji:"✈️",word:"plane"},{emoji:"🦁",word:"lion"},{emoji:"🍉",word:"watermelon"},
     {emoji:"🌟",word:"star"}]
];

let currentLevel = 0;
let selected = [];
let timer = 180;
let timerInterval;

// DOM
const homePage = document.getElementById("homePage");
const gamePage = document.getElementById("gamePage");
const popup = document.getElementById("popup");
const grid = document.getElementById("grid");
const message = document.getElementById("message");
const levelText = document.getElementById("levelText");
const timerText = document.getElementById("timer");

// 音效 + 语音
function beep(freq, time) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + time);
    osc.stop(ctx.currentTime + time);
}

function speak(word) {
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = "en-US";
    utter.rate = 0.85;
    utter.pitch = 1.1;
    speechSynthesis.speak(utter);
}

// 开始游戏
document.getElementById("playBtn").addEventListener("click", () => {
    popup.style.display = "flex";
});

document.getElementById("startBtn").addEventListener("click", () => {
    popup.style.display = "none";
    homePage.style.display = "none";
    gamePage.style.display = "block";
    currentLevel = 0;
    loadLevel();
});

// 本关重玩
function restartCurrentLevel() {
    loadLevel();
}

// 倒计时
function startTimer() {
    clearInterval(timerInterval);
    timer = 180 - (currentLevel * 10);
    if (timer < 60) timer = 60;
    timerText.textContent = `⏰ ${timer}`;
    
    timerInterval = setInterval(() => {
        timer--;
        timerText.textContent = `⏰ ${timer}`;
        if (timer <= 0) {
            clearInterval(timerInterval);
            message.innerHTML = "⏰ 时间到啦！<br>再试一次吧～";
            message.classList.add("bigWin");
            setTimeout(restartCurrentLevel, 2200);
        }
    }, 1000);
}

// 加载关卡
function loadLevel() {
    selected = [];
    message.innerHTML = "";
    message.className = "message";
    grid.innerHTML = "";
    
    const levelName = ["水果乐园","蔬菜花园","动物王国","日常生活","交通工具","缤纷颜色","数字世界","身体部位","美味食物","终极挑战"][currentLevel];
    levelText.innerHTML = `第 ${currentLevel+1} 关 - ${levelName}`;
    
    startTimer();

    let baseData = [...allLevels[currentLevel]];
    let targetPairs = 8 + currentLevel * 3;   // 逐渐增加对数：8→35左右
    if (currentLevel === 9) targetPairs = 12;
    
    let data = [];
    while (data.length < targetPairs) {
        data = data.concat(baseData);
    }
    data = data.slice(0, targetPairs);
    
    let cards = [...data, ...data];
    cards.sort(() => Math.random() - 0.5);

    // 自适应网格
    let cols = Math.ceil(Math.sqrt(cards.length));
    let cardSize = 92;
    if (cards.length > 50) cardSize = 78;
    if (cards.length > 70) cardSize = 68;
    
    grid.style.gridTemplateColumns = `repeat(auto-fit, minmax(${cardSize}px, ${cardSize}px))`;

    cards.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.style.width = cardSize + "px";
        card.style.height = cardSize + "px";
        
        card.innerHTML = `
            <div class="emoji" style="font-size:${cardSize * 0.48}px">${item.emoji}</div>
            <div class="word" style="font-size:${cardSize * 0.16}px">${item.word}</div>
        `;
        
        card.dataset.word = item.word;
        card.addEventListener("click", () => selectCard(card, item.word));
        grid.appendChild(card);
    });
}

function selectCard(card, word) {
    if (card.classList.contains("matched") || card.classList.contains("selected")) return;
    
    card.classList.add("selected");
    speak(word);
    
    selected.push(card);
    
    if (selected.length === 2) {
        const [a, b] = selected;
        if (a.dataset.word === b.dataset.word) {
            beep(880, 0.12);
            setTimeout(() => {
                a.classList.add("matched");
                b.classList.add("matched");
                checkWin();
            }, 280);
        } else {
            beep(220, 0.25);
            setTimeout(() => {
                a.classList.remove("selected");
                b.classList.remove("selected");
            }, 580);
        }
        selected = [];
    }
}

function checkWin() {
    const total = document.querySelectorAll(".card").length;
    const matched = document.querySelectorAll(".matched").length;
    
    if (total === matched) {
        clearInterval(timerInterval);
        message.innerHTML = "🎉 太棒了！<br>你真厉害！";
        message.classList.add("bigWin");
        beep(1200, 0.4);
        
        setTimeout(() => {
            currentLevel++;
            if (currentLevel < allLevels.length) {
                loadLevel();
            } else {
                finalWin();
            }
        }, 2400);
    }
}

function finalWin() {
    grid.innerHTML = "";
    message.innerHTML = `
        <div class="bigWin" style="font-size:38px;">
            🏆 全部通关！<br><br>
            你是英语小天才！<br><br>
            <button onclick="restartWholeGame()" class="restartBigBtn">
                再玩一次
            </button>
        </div>
    `;
    speak("Congratulations! You are the best!");
    beep(1600, 0.6);
}

function restartWholeGame() {
    currentLevel = 0;
    loadLevel();
}
</script>
</body>
</html>
