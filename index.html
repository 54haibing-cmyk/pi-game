<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Glass Tetris 3D</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top,#183b7a 0%,#050816 45%,#000 100%);
    font-family:Arial;
}

/* 星空 */
.stars{
    position:fixed;
    inset:0;
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    border-radius:50%;
    background:white;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}

/* 游戏外框 */
.game-shell{
    position:relative;
    padding:18px;
    border-radius:38px;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,.32),
            rgba(255,255,255,.06)
        );

    border:1px solid rgba(255,255,255,.25);

    backdrop-filter:blur(20px);

    box-shadow:
        0 0 30px rgba(0,140,255,.35),
        inset 0 0 25px rgba(255,255,255,.12),
        0 0 80px rgba(0,100,255,.18);
}

/* 标题 */
.title{
    text-align:center;
    color:white;
    font-size:24px;
    font-weight:bold;
    margin-bottom:14px;
    letter-spacing:2px;
    text-shadow:0 0 12px #61d9ff;
}

/* 画布 */
canvas{
    display:block;
    border-radius:24px;
    background:
        linear-gradient(
            180deg,
            rgba(0,10,30,.92),
            rgba(0,0,0,.96)
        );

    box-shadow:
        inset 0 0 35px rgba(0,120,255,.2),
        0 0 20px rgba(0,180,255,.25);

    border:1px solid rgba(255,255,255,.1);
}

/* 手机适配 */
@media (max-width:600px){

    .game-shell{
        transform:scale(.92);
    }

    .title{
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="game-shell">

    <div class="title">
        GLASS TETRIS
    </div>

    <canvas id="game" width="300" height="600"></canvas>

</div>

<script>

/* 星空 */

const stars = document.getElementById("stars");

for(let i=0;i<90;i++){

    const s = document.createElement("div");

    s.className="star";

    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.animationDelay=Math.random()*3+"s";

    stars.appendChild(s);
}

/* 音效 */

const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

function beep(freq,duration){

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value=freq;
    osc.type="triangle";

    gain.gain.value=0.05;

    osc.start();

    osc.stop(audioCtx.currentTime + duration);
}

/* 游戏 */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const ROW = 20;
const COL = 10;
const SIZE = 30;

const colors = [
    null,
    "#00e5ff",
    "#ffe600",
    "#ff4d4d",
    "#00ff66",
    "#b266ff",
    "#ff8800",
    "#3d7dff"
];

const arena = createMatrix(COL,ROW);

function createMatrix(w,h){

    const matrix=[];

    while(h--){
        matrix.push(new Array(w).fill(0));
    }

    return matrix;
}

function drawCell(x,y,color){

    const px=x*SIZE;
    const py=y*SIZE;

    /* 玻璃渐变 */

    const g = ctx.createLinearGradient(
        px,
        py,
        px+SIZE,
        py+SIZE
    );

    g.addColorStop(0,"rgba(255,255,255,.95)");
    g.addColorStop(.15,color);
    g.addColorStop(1,"rgba(0,0,0,.35)");

    ctx.fillStyle=g;

    ctx.beginPath();

    roundRect(
        ctx,
        px+2,
        py+2,
        SIZE-4,
        SIZE-4,
        8
    );

    ctx.fill();

    /* 发光 */

    ctx.shadowColor=color;
    ctx.shadowBlur=15;

    ctx.strokeStyle="rgba(255,255,255,.55)";
    ctx.lineWidth=1;

    ctx.stroke();

    ctx.shadowBlur=0;

    /* 高光 */

    ctx.fillStyle="rgba(255,255,255,.35)";

    roundRect(
        ctx,
        px+6,
        py+6,
        SIZE-12,
        8,
        4
    );

    ctx.fill();
}

function roundRect(ctx,x,y,w,h,r){

    ctx.beginPath();

    ctx.moveTo(x+r,y);

    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);

    ctx.closePath();
}

function drawMatrix(matrix,offset){

    matrix.forEach((row,y)=>{

        row.forEach((value,x)=>{

            if(value!==0){

                drawCell(
                    x+offset.x,
                    y+offset.y,
                    colors[value]
                );
            }
        });
    });
}

function merge(arena,player){

    player.matrix.forEach((row,y)=>{

        row.forEach((value,x)=>{

            if(value!==0){

                arena[y+player.pos.y][x+player.pos.x]=value;
            }
        });
    });
}

function collide(arena,player){

    const m=player.matrix;
    const o=player.pos;

    for(let y=0;y<m.length;y++){

        for(let x=0;x<m[y].length;x++){

            if(
                m[y][x]!==0 &&
                (
                    arena[y+o.y] &&
                    arena[y+o.y][x+o.x]
                )!==0
            ){
                return true;
            }
        }
    }

    return false;
}

function playerDrop(){

    player.pos.y++;

    if(collide(arena,player)){

        player.pos.y--;

        merge(arena,player);

        playerReset();

        arenaSweep();

        beep(180,0.08);
    }

    dropCounter=0;
}

function arenaSweep(){

    outer:
    for(let y=arena.length-1;y>0;y--){

        for(let x=0;x<arena[y].length;x++){

            if(arena[y][x]===0){
                continue outer;
            }
        }

        const row=arena.splice(y,1)[0].fill(0);

        arena.unshift(row);

        y++;

        beep(400,0.12);
    }
}

function playerMove(dir){

    player.pos.x+=dir;

    if(collide(arena,player)){
        player.pos.x-=dir;
    }
}

function rotate(matrix){

    for(let y=0;y<matrix.length;y++){

        for(let x=0;x<y;x++){

            [
                matrix[x][y],
                matrix[y][x]
            ]=[
                matrix[y][x],
                matrix[x][y]
            ];
        }
    }

    matrix.forEach(row=>row.reverse());
}

function playerRotate(){

    rotate(player.matrix);

    if(collide(arena,player)){

        rotate(player.matrix);
        rotate(player.matrix);
        rotate(player.matrix);
    }
}

function createPiece(type){

    if(type==="T"){
        return [
            [0,1,0],
            [1,1,1],
            [0,0,0]
        ];
    }

    if(type==="O"){
        return [
            [2,2],
            [2,2]
        ];
    }

    if(type==="L"){
        return [
            [0,3,0],
            [0,3,0],
            [0,3,3]
        ];
    }

    if(type==="J"){
        return [
            [0,4,0],
            [0,4,0],
            [4,4,0]
        ];
    }

    if(type==="I"){
        return [
            [0,5,0,0],
            [0,5,0,0],
            [0,5,0,0],
            [0,5,0,0]
        ];
    }

    if(type==="S"){
        return [
            [0,6,6],
            [6,6,0],
            [0,0,0]
        ];
    }

    if(type==="Z"){
        return [
            [7,7,0],
            [0,7,7],
            [0,0,0]
        ];
    }
}

function playerReset(){

    const pieces="TJLOSZI";

    player.matrix=createPiece(
        pieces[
            pieces.length*Math.random() | 0
        ]
    );

    player.pos.y=0;

    player.pos.x=
        (COL/2 | 0) -
        (player.matrix[0].length/2 | 0);

    if(collide(arena,player)){

        arena.forEach(row=>row.fill(0));
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* 网格 */

    ctx.strokeStyle="rgba(255,255,255,.05)";

    for(let x=0;x<COL;x++){

        ctx.beginPath();
        ctx.moveTo(x*SIZE,0);
        ctx.lineTo(x*SIZE,canvas.height);
        ctx.stroke();
    }

    for(let y=0;y<ROW;y++){

        ctx.beginPath();
        ctx.moveTo(0,y*SIZE);
        ctx.lineTo(canvas.width,y*SIZE);
        ctx.stroke();
    }

    drawMatrix(arena,{x:0,y:0});
    drawMatrix(player.matrix,player.pos);
}

let dropCounter=0;
let dropInterval=700;
let lastTime=0;

function update(time=0){

    const delta=time-lastTime;

    lastTime=time;

    dropCounter+=delta;

    if(dropCounter>dropInterval){

        playerDrop();
    }

    draw();

    requestAnimationFrame(update);
}

document.addEventListener("keydown",e=>{

    if(e.key==="ArrowLeft"){
        playerMove(-1);
    }

    else if(e.key==="ArrowRight"){
        playerMove(1);
    }

    else if(e.key==="ArrowDown"){
        playerDrop();
    }

    else if(e.key==="ArrowUp"){
        playerRotate();
    }
});

const player={
    pos:{x:0,y:0},
    matrix:null
};

playerReset();
update();

</script>

</body>
</html>
