<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>Kids English Ultimate 2.0</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:
linear-gradient(180deg,#0f172a,#111827,#020617);
color:white;
}

/* 星空 */

#stars{
position:fixed;
inset:0;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2;}
50%{opacity:1;}
}

/* 页面 */

.page{
position:absolute;
inset:0;
z-index:2;
overflow:auto;
padding-bottom:100px;
}

/* 首页 */

.home{
display:flex;
flex-direction:column;
align-items:center;
padding-top:40px;
}

.logo{
font-size:34px;
font-weight:bold;
text-shadow:0 0 18px cyan;
}

.sub{
margin-top:8px;
opacity:.8;
}

.playBtn{

margin-top:50px;

width:240px;
height:90px;

border:none;

border-radius:28px;

font-size:30px;
font-weight:bold;

background:
linear-gradient(145deg,#00d2ff,#3a7bd5);

color:white;

box-shadow:
0 0 25px rgba(0,255,255,.35);

cursor:pointer;

transition:.25s;
}

.playBtn:hover{
transform:scale(1.05);
}

/* 顶部 */

.topBar{

display:flex;
justify-content:space-between;
align-items:center;

padding:18px;
}

.level{
font-size:24px;
color:#ffe66d;
}

.timer{
font-size:22px;
color:#ff7b7b;
}

.restartBtn{

padding:10px 18px;

border:none;

border-radius:15px;

background:#00eaff;

font-size:16px;
font-weight:bold;

cursor:pointer;
}

/* 游戏区域 */

.grid{

display:grid;

gap:8px;

justify-content:center;

padding:12px;
}

/* 卡片 */

.card{

border-radius:18px;

background:
linear-gradient(145deg,#00d2ff,#3a7bd5);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

cursor:pointer;

transition:.25s;

box-shadow:
0 0 12px rgba(0,255,255,.25),
inset 0 0 10px rgba(255,255,255,.25);

user-select:none;
}

.card:hover{
transform:scale(1.05);
}

.card.selected{
background:#ffe66d;
color:black;
transform:scale(1.08);
}

.card.matched{
opacity:0;
transform:scale(0);
pointer-events:none;
}

.emoji{
font-size:30px;
}

.word{
font-size:12px;
margin-top:5px;
}

/* 信息 */

.message{

text-align:center;

font-size:40px;

margin-top:10px;

color:#00ff95;

text-shadow:
0 0 15px #00ff95;
}

.bigWin{
animation:boom 1s infinite;
}

@keyframes boom{
0%{transform:scale(1);}
50%{transform:scale(1.12);}
100%{transform:scale(1);}
}

/* 弹窗 */

.popup{

position:fixed;
inset:0;

background:rgba(0,0,0,.75);

display:none;

justify-content:center;
align-items:center;

z-index:999;
}

.popupBox{

width:90%;
max-width:420px;

background:
linear-gradient(145deg,#1e293b,#334155);

padding:30px;

border-radius:30px;

text-align:center;
}

.popupTitle{
font-size:30px;
margin-bottom:20px;
}

.startBtn{

margin-top:25px;

padding:16px 34px;

border:none;

border-radius:18px;

background:#00eaff;

font-size:22px;
font-weight:bold;

cursor:pointer;
}

/* 手机 */

@media(max-width:600px){

.logo{
font-size:28px;
}

}

</style>
</head>
<body>

<!-- 星空 -->

<div id="stars"></div>

<!-- 首页 -->

<div class="page home" id="homePage">

<div class="logo">
🌟 Kids English 2.0 🌟
</div>

<div class="sub">
幼儿英语终极闯关乐园
</div>

<button class="playBtn" id="playBtn">
🎮 开始游戏
</button>

</div>

<!-- 游戏 -->

<div class="page" id="gamePage" style="display:none;">

<div class="topBar">

<div class="level" id="levelText">
第1关
</div>

<div class="timer" id="timer">
⏰ 180
</div>

<button class="restartBtn"
onclick="restartGame()">

重新开始

</button>

</div>

<div class="grid" id="grid"></div>

<div class="message" id="message"></div>

</div>

<!-- 规则 -->

<div class="popup" id="popup">

<div class="popupBox">

<div class="popupTitle">
📖 游戏规则
</div>

<p>

点击相同图片进行配对<br><br>

会自动英语发音<br><br>

全部消除即可进入下一关<br><br>

每关时间会减少10秒

</p>

<button class="startBtn" id="startBtn">
开始冒险 →
</button>

</div>

</div>

<script>

/* 星空 */

const stars=document.getElementById("stars");

for(let i=0;i<150;i++){

const s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDelay=Math.random()*5+"s";

stars.appendChild(s);

}

/* 页面 */

const homePage=document.getElementById("homePage");

const gamePage=document.getElementById("gamePage");

const popup=document.getElementById("popup");

/* 开始 */

document.getElementById("playBtn")
.addEventListener("click",()=>{

popup.style.display="flex";

});

document.getElementById("startBtn")
.addEventListener("click",()=>{

popup.style.display="none";

homePage.style.display="none";

gamePage.style.display="block";

startGame();

});

/* 数据 */

const allLevels=[

/* 水果 */

[
{emoji:"🍎",word:"apple"},
{emoji:"🍌",word:"banana"},
{emoji:"🍇",word:"grape"},
{emoji:"🍓",word:"strawberry"},
{emoji:"🍉",word:"watermelon"}
],

/* 蔬菜 */

[
{emoji:"🥕",word:"carrot"},
{emoji:"🌽",word:"corn"},
{emoji:"🥔",word:"potato"},
{emoji:"🍅",word:"tomato"},
{emoji:"🥦",word:"broccoli"},
{emoji:"🧅",word:"onion"}
],

/* 动物 */

[
{emoji:"🐱",word:"cat"},
{emoji:"🐶",word:"dog"},
{emoji:"🐭",word:"mouse"},
{emoji:"🐰",word:"rabbit"},
{emoji:"🐼",word:"panda"},
{emoji:"🦁",word:"lion"},
{emoji:"🐸",word:"frog"}
],

/* 生活用品 */

[
{emoji:"🪥",word:"toothbrush"},
{emoji:"🧸",word:"toy"},
{emoji:"🛏️",word:"bed"},
{emoji:"🪑",word:"chair"},
{emoji:"🕯️",word:"candle"},
{emoji:"📱",word:"phone"},
{emoji:"⌚",word:"watch"},
{emoji:"💡",word:"lamp"}
],

/* 交通 */

[
{emoji:"🚗",word:"car"},
{emoji:"✈️",word:"plane"},
{emoji:"🚲",word:"bike"},
{emoji:"🚂",word:"train"},
{emoji:"🚌",word:"bus"},
{emoji:"🚢",word:"ship"},
{emoji:"🚁",word:"helicopter"},
{emoji:"🏍️",word:"motorcycle"}
],

/* 颜色 */

[
{emoji:"🔴",word:"red"},
{emoji:"🔵",word:"blue"},
{emoji:"🟢",word:"green"},
{emoji:"🟡",word:"yellow"},
{emoji:"🟣",word:"purple"},
{emoji:"⚫",word:"black"},
{emoji:"⚪",word:"white"},
{emoji:"🟠",word:"orange"}
],

/* 数字 */

[
{emoji:"1️⃣",word:"one"},
{emoji:"2️⃣",word:"two"},
{emoji:"3️⃣",word:"three"},
{emoji:"4️⃣",word:"four"},
{emoji:"5️⃣",word:"five"},
{emoji:"6️⃣",word:"six"},
{emoji:"7️⃣",word:"seven"},
{emoji:"8️⃣",word:"eight"}
],

/* 身体 */

[
{emoji:"👀",word:"eyes"},
{emoji:"👂",word:"ear"},
{emoji:"👃",word:"nose"},
{emoji:"👄",word:"mouth"},
{emoji:"🖐️",word:"hand"},
{emoji:"🦶",word:"foot"},
{emoji:"💪",word:"arm"},
{emoji:"🦵",word:"leg"}
],

/* 食物 */

[
{emoji:"🍕",word:"pizza"},
{emoji:"🍔",word:"burger"},
{emoji:"🍟",word:"fries"},
{emoji:"🍰",word:"cake"},
{emoji:"🍩",word:"donut"},
{emoji:"🍪",word:"cookie"},
{emoji:"🍜",word:"noodles"},
{emoji:"🥛",word:"milk"}
],

/* Boss关 */

[
{emoji:"🐱",word:"cat"},
{emoji:"🍎",word:"apple"},
{emoji:"🚗",word:"car"},
{emoji:"🍕",word:"pizza"},
{emoji:"🔴",word:"red"},
{emoji:"👀",word:"eyes"},
{emoji:"✈️",word:"plane"},
{emoji:"🦁",word:"lion"},
{emoji:"🍩",word:"donut"},
{emoji:"🧸",word:"toy"}
]

];

let currentLevel=0;

let selected=[];

let timer=180;

let timerInterval;

/* DOM */

const grid=document.getElementById("grid");

const message=document.getElementById("message");

const levelText=document.getElementById("levelText");

const timerText=document.getElementById("timer");

/* 音效 */

function beep(freq,time){

const ctx=new(
window.AudioContext||
window.webkitAudioContext
)();

const osc=ctx.createOscillator();

const gain=ctx.createGain();

osc.connect(gain);

gain.connect(ctx.destination);

osc.frequency.value=freq;

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.00001,
ctx.currentTime+time
);

osc.stop(ctx.currentTime+time);

}

/* 发音 */

function speak(word){

const utter=
new SpeechSynthesisUtterance(word);

utter.lang="en-US";

utter.rate=0.9;

speechSynthesis.speak(utter);

}

/* 开始游戏 */

function startGame(){

currentLevel=0;

loadLevel();

}

/* 重新开始 */

function restartGame(){

currentLevel=0;

loadLevel();

}

/* 倒计时 */

function startTimer(){

clearInterval(timerInterval);

timer=180-(currentLevel*10);

timerText.innerHTML=`⏰ ${timer}`;

timerInterval=setInterval(()=>{

timer--;

timerText.innerHTML=`⏰ ${timer}`;

if(timer<=0){

clearInterval(timerInterval);

message.innerHTML=
"⏰ 时间到！";

message.classList.add("bigWin");

setTimeout(()=>{

loadLevel();

},2000);

}

},1000);

}

/* 加载关卡 */

function loadLevel(){

selected=[];

message.innerHTML="";

message.className="message";

grid.innerHTML="";

levelText.innerHTML=
`🎮 第 ${currentLevel+1} 关`;

startTimer();

let pairs=10+(currentLevel*2);

let data=[...allLevels[currentLevel]];

/* 自动增加数量 */

while(data.length<pairs){

data=data.concat(allLevels[currentLevel]);

}

data=data.slice(0,pairs);

let cards=[...data,...data];

cards.sort(()=>Math.random()-0.5);

/* 自适应大小 */

let cols=Math.ceil(Math.sqrt(cards.length));

let size=70;

if(cards.length>40) size=50;

if(cards.length>70) size=40;

if(cards.length>100) size=34;

grid.style.gridTemplateColumns=
`repeat(${cols},${size}px)`;

/* 创建 */

cards.forEach(item=>{

const card=document.createElement("div");

card.className="card";

card.style.width=size+"px";

card.style.height=size+"px";

card.innerHTML=`

<div class="emoji"
style="font-size:${size/2.2}px">
${item.emoji}
</div>

<div class="word"
style="font-size:${size/6}px">
${item.word}
</div>

`;

card.dataset.word=item.word;

card.addEventListener("click",()=>{

selectCard(card,item.word);

});

grid.appendChild(card);

});

}

/* 点击 */

function selectCard(card,word){

if(
card.classList.contains("matched")
||
card.classList.contains("selected")
) return;

card.classList.add("selected");

speak(word);

selected.push(card);

if(selected.length===2){

const a=selected[0];

const b=selected[1];

if(a.dataset.word===b.dataset.word){

beep(800,0.15);

setTimeout(()=>{

a.classList.add("matched");

b.classList.add("matched");

checkWin();

},250);

}else{

beep(180,0.2);

setTimeout(()=>{

a.classList.remove("selected");

b.classList.remove("selected");

},500);

}

selected=[];

}

}

/* 通关 */

function checkWin(){

const total=
document.querySelectorAll(".card")
.length;

const matched=
document.querySelectorAll(".matched")
.length;

if(total===matched){

clearInterval(timerInterval);

message.innerHTML=
"👍 太棒啦！<br>🎉 恭喜通关！";

message.classList.add("bigWin");

beep(1200,0.3);

setTimeout(()=>{

currentLevel++;

if(currentLevel<10){

loadLevel();

}else{

finalWin();

}

},2500);

}

}

/* 最终 */

function finalWin(){

grid.innerHTML="";

message.innerHTML=`

<div class="bigWin">

🏆 全部完成！<br><br>

🎉 你是英语小天才！<br><br>

<button
onclick="restartGame()"
style="
margin-top:20px;
padding:18px 35px;
border:none;
border-radius:18px;
background:#00eaff;
font-size:24px;
font-weight:bold;
cursor:pointer;
">

再来一次

</button>

</div>

`;

speak("Congratulations");

beep(1500,0.5);

}

</script>

</body>
</html>
